<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Еда мира</title>

<style>
  body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
  }

  h1{
    font-size:60px;
    margin-bottom:15px;
  }

  p{
    font-size:20px;
    color:#cbd5e1;
    margin-bottom:30px;
  }

  button{
    padding:15px 40px;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    background:#f97316;
    color:white;
    transition:0.3s;
  }

  button:hover{
    transform:scale(1.1);
    background:#fb923c;
  }
</style>
</head>

<body>

<h1>🍔 ЕДА МИРА 🌍</h1>

<p>Нажми кнопку и открой вкусные блюда мира</p>

<button onclick="goFood()">
  Смотреть еду
</button>

<script>
  function goFood(){
    window.location.href = "food.html";
  }
</script>

</body>
</html>
