<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Gallery</title>

<style>
  body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    padding:40px;
  }

  h1{
    text-align:center;
    font-size:50px;
    margin-bottom:40px;
    color:#f97316;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
  }

  .card{
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
  }

  .card:hover{
    transform:scale(1.05);
  }

  img{
    width:100%;
    height:200px;
    object-fit:cover;
  }

  .text{
    padding:15px;
    text-align:center;
    font-size:18px;
  }

  .back{
    display:block;
    text-align:center;
    margin-top:40px;
    text-decoration:none;
    color:white;
    background:#f97316;
    padding:12px 25px;
    border-radius:30px;
    width:200px;
    margin-left:auto;
    margin-right:auto;
  }

  .back:hover{
    background:#fb923c;
  }
</style>
</head>

<body>

<h1>🌍 Еда мира</h1>

<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
    <div class="text">Бургер 🍔</div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
    <div class="text">Пицца 🍕</div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
    <div class="text">Суши 🍣</div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
    <div class="text">Салаты 🥗</div>
  </div>

</div>

<a class="back" href="index.html">⬅ Назад</a>

</body>
</html>
